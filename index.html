<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Gallery Showcase</title>
    <style>
        /* إعدادات الصفحة العامة */
        body {
            background-color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* الحاوية الرئيسية */
        .main-container {
            width: 90%;
            max-width: 1100px;
            background-color: #1a1a1a; /* لون المربع الكبير الداكن كما في الصورة */
            border-radius: 15px;
            padding: 20px;
            display: flex;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* قسم الفيديو الكبير (65%) */
        .main-video-section {
            flex: 0 0 65%;
            position: relative;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
        }

        .main-video-section iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* قسم القائمة الجانبية */
        .side-playlist {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 450px; /* لتفعيل التمرير إذا زادت الفيديوهات */
            overflow-y: auto;
            padding-right: 5px;
        }

        /* تنسيق الفيديوهات الصغيرة */
        .thumb-item {
            cursor: pointer;
            background: #2a2a2a;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s, background 0.2s;
            display: flex;
            flex-direction: column;
        }

        .thumb-item:hover {
            background: #3a3a3a;
            transform: scale(1.02);
        }

        .thumb-item img {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
        }

        /* تحسين مظهر التمرير */
        .side-playlist::-webkit-scrollbar {
            width: 5px;
        }
        .side-playlist::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 10px;
        }

        /* متجاوب مع الشاشات الصغيرة */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }
            .main-video-section {
                flex: 1 0 100%;
            }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="main-video-section" id="mainPlayerWrap">
        <iframe id="mainPlayer" 
            src="https://www.youtube.com/embed/yw6jr3jXrEI?enablejsapi=1" 
            allowfullscreen>
        </iframe>
    </div>

    <div class="side-playlist" id="playlist">
        <div class="thumb-item" onclick="swapVideo(this, 'PTnRYDBoS98')">
            <img src="https://img.youtube.com/vi/PTnRYDBoS98/mqdefault.jpg" alt="Video 2">
        </div>
        <div class="thumb-item" onclick="swapVideo(this, 'X2Rfjeh4QwI')">
            <img src="https://img.youtube.com/vi/X2Rfjeh4QwI/mqdefault.jpg" alt="Video 3">
        </div>
        <div class="thumb-item" onclick="swapVideo(this, '-qQsvqKB1_Y')">
            <img src="https://img.youtube.com/vi/-qQsvqKB1_Y/mqdefault.jpg" alt="Video 4">
        </div>
        <div class="thumb-item" onclick="swapVideo(this, 'jAKU_YR0YDs')">
            <img src="https://img.youtube.com/vi/jAKU_YR0YDs/mqdefault.jpg" alt="Video 5">
        </div>
    </div>
</div>

<script>
    function swapVideo(element, newId) {
        const mainPlayer = document.getElementById('mainPlayer');
        
        // 1. استخراج الـ ID الحالي للفيديو الكبير من الـ URL
        const currentUrl = mainPlayer.src;
        const currentId = currentUrl.split('/embed/')[1].split('?')[0];

        // 2. تغيير فيديو المشغل الرئيسي
        mainPlayer.src = `https://www.youtube.com/embed/${newId}?autoplay=1&enablejsapi=1`;

        // 3. تحديث الفيديو الصغير ليأخذ مكان الفيديو الذي كان كبيراً
        // نقوم بتحديث الصورة والحدث الخاص بالضغط
        element.querySelector('img').src = `https://img.youtube.com/vi/${currentId}/mqdefault.jpg`;
        element.setAttribute('onclick', `swapVideo(this, '${currentId}')`);
    }
</script>

</body>
</html>
